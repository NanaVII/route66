<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="style.css">
    <title>Route 66 - Admin Login</title>
</head>
<body style="display: flex; align-items: center; justify-content: center; height: 100vh; background-color: var(--dark-blue);">
    <div class="card" style="width: 400px;">
        <h2 class="logo" style="margin-bottom: 2rem;">ROUTE 66</h2>
        <form action="dashboard.html">
            <input type="text" placeholder="Username" style="width: 90%; margin-bottom: 1rem;">
            <input type="password" placeholder="Password" style="width: 90%; margin-bottom: 1rem;">
            <button class="btn-add" style="width: 100%; background-color: var(--dark-blue);">Login</button>
        </form>
    </div>
</body>
</html>
